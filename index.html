<!doctype html>

<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Кредо Лидера. Симулятор Управленческого Опыта</title>
    <style>:root {
  --bg: #0b0b0a;
  --screen: #171714;
  --paper: #d9d4c8;
  --paper-dark: #b9b2a5;
  --ink: #f5ecd2;
  --text: #141412;
  --muted: #a99f83;
  --gold: #e3b927;
  --line: #2e2c25;
  --red: #c96b55;
  --green: #91bd68;
  --blue: #6d93a2;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  color: var(--ink);
  background:
    linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
    radial-gradient(circle at top, #292716 0, #0b0b0a 58%);
  background-size: 4px 4px, 4px 4px, auto;
  font-family:
    Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

.logo-reveal-screen {
  position: fixed;
  z-index: 10000;
  inset: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
  justify-items: center;
  align-items: center;
  gap: clamp(14px, 2vh, 24px);
  padding: clamp(14px, 2.2vh, 28px);
  overflow: hidden;
  background: #0c0f0e;
  cursor: pointer;
  opacity: 1;
  transition: opacity 420ms ease;
}

.logo-reveal-screen picture {
  display: grid;
  width: 100%;
  height: 100%;
  min-height: 0;
  overflow: hidden;
  place-items: center;
}

.logo-reveal-screen img {
  display: block;
  justify-self: center;
  align-self: end;
  width: min(100%, calc((100dvh - 150px) * 16 / 9));
  height: auto;
  max-width: min(100%, 1680px);
  max-height: calc(100dvh - 150px);
  object-fit: contain;
}

.logo-reveal-enter {
  position: relative;
  z-index: 2;
  justify-self: center;
  align-self: start;
  margin: 0 18px clamp(12px, 2vh, 24px);
  min-width: clamp(220px, 20vw, 320px);
  min-height: 58px;
  padding: 12px 24px;
  color: #050504;
  background: var(--gold);
  border: 4px solid #050504;
  box-shadow:
    0 0 0 3px var(--gold),
    8px 8px 0 rgba(0, 0, 0, 0.88);
  font-size: clamp(16px, 1.6vw, 22px);
  font-weight: 1000;
  text-transform: uppercase;
  white-space: nowrap;
  visibility: hidden;
  pointer-events: none;
  opacity: 0;
  transform: translateY(12px);
  transition:
    opacity 700ms ease,
    transform 700ms ease,
    visibility 0s linear 700ms;
}

.logo-reveal-screen.is-frozen .logo-reveal-enter {
  visibility: visible;
  pointer-events: auto;
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0s;
}

.logo-reveal-enter:hover,
.logo-reveal-enter:focus-visible {
  color: var(--gold);
  background: #11110f;
  outline: 3px solid var(--ink);
  outline-offset: 3px;
}

.logo-reveal-screen:focus-visible {
  outline: 3px solid var(--gold);
  outline-offset: -7px;
}

.logo-reveal-screen.is-leaving {
  pointer-events: none;
  opacity: 0;
}

.is-logo-reveal {
  overflow: hidden;
  background: #0c0f0e;
}

.is-logo-reveal .game-shell,
.is-logo-reveal dialog {
  visibility: hidden;
}

@keyframes revealHintPulse {
  0%,
  100% {
    filter: brightness(0.9);
  }

  50% {
    filter: brightness(1.15);
  }
}

@media (max-width: 560px) {
  .logo-reveal-hint {
    left: 50%;
    right: auto;
    transform: translateX(-50%);
  }
}

button {
  min-height: 46px;
  padding: 0 18px;
  color: #090907;
  background: var(--gold);
  border: 3px solid #050504;
  box-shadow: 4px 4px 0 #000;
  cursor: pointer;
  font: inherit;
  font-weight: 900;
}

button:disabled {
  cursor: not-allowed;
  filter: grayscale(1);
  opacity: 0.55;
}

button:hover:not(:disabled) {
  filter: brightness(1.08);
}

.game-shell {
  display: grid;
  grid-template-columns: minmax(720px, 1fr) 360px;
  gap: 18px;
  min-height: 100vh;
  padding: 18px;
}

.game-screen,
dialog {
  border: 4px solid var(--line);
  box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
}

.game-screen {
  display: flex;
  min-width: 0;
  flex-direction: column;
  aspect-ratio: 3 / 2;
  max-height: calc(100vh - 36px);
  margin: auto 0;
  overflow: hidden;
  background: var(--screen);
}

.topbar {
  display: grid;
  grid-template-columns: auto auto minmax(0, 1fr);
  align-items: center;
  gap: 16px;
  padding: 14px 18px;
  border: 4px solid var(--gold);
  background: #11110f;
  font-size: clamp(18px, 2.2vw, 34px);
  font-weight: 900;
}

.is-start-screen .topbar {
  display: none;
}

.is-start-screen .view {
  padding: 0;
}

.is-start-screen .game-shell {
  width: 100%;
  height: 100dvh;
  min-height: 0;
  padding: 12px;
}

.is-start-screen .game-screen {
  width: min(1536px, calc(100vw - 24px));
  height: calc(100dvh - 24px);
  max-height: calc(100dvh - 24px);
  aspect-ratio: auto;
}

.icon-button {
  width: 58px;
  min-height: 48px;
  padding: 0;
}

.ui-icon {
  display: inline-grid;
  width: 24px;
  height: 24px;
  flex: 0 0 auto;
  place-items: center;
  color: currentColor;
}

.ui-icon svg {
  width: 100%;
  height: 100%;
  fill: none;
  stroke: currentColor;
  stroke-linecap: round;
  stroke-linejoin: round;
  stroke-width: 2.35;
}

.ui-icon.icon-quality svg,
.ui-icon.icon-tension svg {
  fill: rgba(227, 185, 39, 0.22);
}

.top-metrics {
  display: flex;
  flex-wrap: wrap;
  justify-content: flex-end;
  gap: 8px 10px;
  font-size: clamp(13px, 1.3vw, 20px);
}

.top-actions-label {
  align-self: center;
  color: var(--muted);
  font-size: 13px;
  font-weight: 900;
  text-transform: uppercase;
}

.top-action-button {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 40px;
  padding: 0 12px;
  color: var(--ink);
  background: #1c1c18;
  border: 2px solid #050504;
  box-shadow: 2px 2px 0 #000;
  font-size: 13px;
}

.top-action-button .ui-icon {
  width: 20px;
  height: 20px;
  color: var(--gold);
}

.top-action-button.kpi {
  color: #080806;
  background: var(--gold);
}

.top-action-button.home {
  color: #080806;
  background: #f0ead8;
}

.top-action-button.kpi .ui-icon {
  color: #080806;
}

.top-action-button.home .ui-icon {
  color: #080806;
}

.metric-chip {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  min-height: 34px;
  padding: 3px 5px;
  color: var(--ink);
  background: transparent;
  border: 0;
  box-shadow: none;
  white-space: nowrap;
}

.metric-chip:hover:not(:disabled),
.metric-row:hover:not(:disabled),
.messenger-metric:hover:not(:disabled) {
  filter: none;
}

.metric-chip .ui-icon {
  width: 22px;
  height: 22px;
  padding: 3px;
  color: #080806;
  background: var(--gold);
  border: 2px solid #050504;
}

.metric-chip.risk .ui-icon {
  background: var(--red);
}

.mini-bar {
  display: inline-grid;
  grid-template-columns: repeat(10, 8px);
  gap: 2px;
}

.mini-bar span {
  width: 8px;
  height: 14px;
  background: #3e3e38;
}

.mini-bar span.on {
  background: var(--gold);
}

.metric-chip.risk .mini-bar span.on {
  background: var(--red);
}

.view {
  position: relative;
  flex: 1;
  min-height: 0;
  padding: 24px;
  overflow: auto;
  overflow-anchor: none;
  background:
    linear-gradient(rgba(0, 0, 0, 0.08), rgba(0, 0, 0, 0.08)),
    var(--paper);
  background-position: center;
  background-size: cover;
  color: var(--text);
}

.screen-title {
  margin: 0 0 18px;
  padding: 10px 16px;
  color: var(--gold);
  background: #11110f;
  border: 3px solid #050504;
  text-align: center;
  font-size: clamp(26px, 3vw, 44px);
  font-weight: 900;
}

.start-view {
  display: grid;
  min-height: 100%;
  align-content: center;
  justify-items: center;
  gap: 24px;
  text-align: center;
  background:
    radial-gradient(circle at center, rgba(227, 185, 39, 0.2), transparent 42%),
    #050504;
}

.start-card {
  width: min(760px, 92%);
  padding: 28px;
  color: var(--ink);
  background: rgba(14, 14, 12, 0.9);
  border: 4px solid var(--gold);
}

.start-card h2 {
  margin: 0 0 14px;
  font-size: clamp(36px, 5vw, 66px);
}

.intro-layout,
.case-layout,
.result-layout,
.final-layout {
  display: grid;
  grid-template-columns: 300px minmax(0, 1fr);
  gap: 22px;
}

.portrait-card,
.content-card,
.mail-item,
.option-card,
.result-card,
.theory-card {
  border: 3px solid #111;
  background: rgba(247, 244, 235, 0.84);
}

.portrait-card {
  overflow: hidden;
  background: #151512;
  color: var(--ink);
}

.portrait {
  display: grid;
  height: 230px;
  place-items: center;
  background:
    linear-gradient(rgba(255, 255, 255, 0.14), rgba(0, 0, 0, 0.16)),
    repeating-linear-gradient(0deg, #777 0 4px, #8a8a80 4px 8px);
}

.avatar {
  position: relative;
  width: 138px;
  height: 164px;
  background:
    linear-gradient(90deg, transparent 0 18px, #1b1b18 18px 32px, transparent 32px 106px, #1b1b18 106px 120px, transparent 120px),
    linear-gradient(#171714 0 30px, #171714 30px 42px, transparent 42px),
    linear-gradient(90deg, transparent 0 24px, #d9ad62 24px 114px, transparent 114px),
    linear-gradient(#d9ad62 0 106px, #f0ead8 106px 122px, #242424 122px 164px);
  border: 4px solid #111;
  box-shadow:
    inset 16px 38px 0 rgba(0, 0, 0, 0.1),
    6px 6px 0 #111;
}

.avatar::before,
.avatar::after {
  content: "";
  position: absolute;
  top: 62px;
  width: 11px;
  height: 11px;
  background: #111;
}

.avatar::before {
  left: 42px;
}

.avatar::after {
  right: 42px;
}

.avatar-face {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.avatar-face::before {
  content: "";
  position: absolute;
  top: 76px;
  left: 64px;
  width: 10px;
  height: 18px;
  background: #b88643;
  box-shadow:
    -18px 48px 0 18px #242424,
    18px 48px 0 18px #242424,
    0 68px 0 7px #d3a22f;
}

.avatar-face::after {
  content: "";
  position: absolute;
  top: 100px;
  left: 55px;
  width: 28px;
  height: 6px;
  background: #111;
  box-shadow:
    -31px -49px 0 8px #d9ad62,
    54px -49px 0 8px #d9ad62,
    12px -88px 0 20px #171714,
    -8px -82px 0 13px #171714;
}

.portrait-card h3,
.portrait-card p {
  margin: 0;
  padding: 12px 16px;
}

.content-card,
.result-card,
.theory-card {
  padding: 20px;
}

.content-card h3,
.result-card h3 {
  margin: 0 0 12px;
  font-size: clamp(24px, 2.4vw, 36px);
}

.content-card p,
.content-card li,
.result-card p,
.result-card li {
  font-size: clamp(16px, 1.45vw, 24px);
  line-height: 1.45;
}

.mail-list {
  display: grid;
  gap: 12px;
}

.mail-item {
  display: grid;
  grid-template-columns: 52px 1fr auto;
  gap: 14px;
  align-items: center;
  width: 100%;
  min-height: 90px;
  padding: 14px;
  color: var(--text);
  background: var(--paper);
  text-align: left;
}

.mail-item.is-active {
  background: var(--gold);
}

.mail-item:disabled {
  color: #777;
  background: #bbb4a6;
  box-shadow: none;
}

.mail-icon {
  display: grid;
  width: 48px;
  height: 38px;
  place-items: center;
  border: 3px solid #111;
  font-size: 24px;
}

.case-layout {
  grid-template-columns: 360px minmax(0, 1fr);
}

.facts {
  display: grid;
  gap: 10px;
  margin: 18px 0;
  padding: 0;
  list-style: none;
}

.facts li {
  padding: 12px 14px;
  background: #11110f;
  color: var(--ink);
  border-left: 8px solid var(--gold);
}

.map-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
}

.map-question {
  padding: 14px;
  border: 3px solid #111;
  background: rgba(255, 255, 255, 0.42);
}

.map-question h3 {
  margin: 0 0 10px;
}

.radio-row {
  display: block;
  margin: 8px 0;
  padding: 10px;
  background: #11110f;
  color: var(--ink);
  border: 2px solid #111;
  cursor: pointer;
}

.radio-row input {
  margin-right: 8px;
  accent-color: var(--gold);
}

.format-grid,
.branch-grid {
  display: grid;
  gap: 16px;
}

.format-grid {
  grid-template-columns: 1fr;
}

.simulation-hub {
  display: grid;
  grid-template-columns: minmax(0, 1.15fr) minmax(360px, 0.85fr);
  gap: 18px;
  min-height: 100%;
  padding: 18px;
  overflow: hidden;
  color: var(--ink);
  background:
    linear-gradient(rgba(5, 5, 4, 0.58), rgba(5, 5, 4, 0.82)),
    radial-gradient(circle at 32% 38%, rgba(227, 185, 39, 0.2), transparent 34%),
    #050504;
}

.simulation-lab {
  position: relative;
  min-height: 0;
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(227, 185, 39, 0.07), transparent 42%),
    #11110f;
  border: 4px solid #050504;
  box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.82);
}

.lab-grid {
  position: absolute;
  inset: 0;
  opacity: 0.42;
  background:
    linear-gradient(rgba(227, 185, 39, 0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(227, 185, 39, 0.08) 1px, transparent 1px);
  background-size: 32px 32px;
  mask-image: radial-gradient(circle at 48% 52%, #000 0 58%, transparent 78%);
}

.lab-title {
  position: relative;
  z-index: 3;
  padding: 24px;
}

.lab-title span,
.simulation-console > header span {
  display: block;
  color: var(--gold);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 0;
  text-transform: uppercase;
}

.lab-title strong {
  display: block;
  max-width: 700px;
  margin-top: 8px;
  font-size: clamp(34px, 4.2vw, 62px);
  line-height: 0.98;
}

.sync-ring {
  position: absolute;
  left: 45%;
  top: 52%;
  width: min(48vw, 500px);
  aspect-ratio: 1;
  border: 3px solid rgba(227, 185, 39, 0.46);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  animation: syncPulse 5.2s ease-in-out infinite;
}

.sync-ring.two {
  width: min(34vw, 360px);
  border-color: rgba(245, 236, 210, 0.34);
  animation-delay: -1.8s;
}

.world-field {
  position: absolute;
  left: 50%;
  top: 55%;
  width: min(48vw, 520px);
  aspect-ratio: 1;
  transform: translate(-50%, -50%);
  z-index: 1;
}

.world-orbit,
.world-core,
.knowledge-node {
  position: absolute;
  display: block;
}

.world-orbit {
  inset: 12%;
  border: 3px solid rgba(227, 185, 39, 0.34);
  border-radius: 50%;
}

.orbit-one {
  transform: rotateX(58deg) rotateZ(-18deg);
  animation: globeTurn 8s linear infinite;
}

.orbit-two {
  transform: rotateY(64deg) rotateZ(26deg);
  animation: globeTurn 10s linear infinite reverse;
}

.orbit-three {
  inset: 22%;
  transform: rotateZ(90deg);
  border-color: rgba(245, 236, 210, 0.22);
}

.world-core {
  inset: 35%;
  border: 4px solid rgba(227, 185, 39, 0.74);
  border-radius: 50%;
  background:
    radial-gradient(circle, rgba(227, 185, 39, 0.35), transparent 62%),
    rgba(17, 17, 15, 0.55);
  box-shadow: 0 0 34px rgba(227, 185, 39, 0.35);
  animation: coreBreath 3.8s ease-in-out infinite;
}

.knowledge-node {
  z-index: 6;
  min-width: 72px;
  padding: 7px 10px;
  color: #080806;
  background: var(--gold);
  border: 3px solid #050504;
  box-shadow: 4px 4px 0 #000;
  font-size: 13px;
  font-weight: 900;
  text-align: center;
  text-transform: uppercase;
}

.node-one {
  left: 7%;
  top: 32%;
}

.node-two {
  right: 4%;
  top: 26%;
}

.node-three {
  right: 1%;
  bottom: 24%;
}

.node-four {
  left: 10%;
  bottom: 20%;
}

.digital-mentor {
  position: absolute;
  left: 50%;
  bottom: 16%;
  width: 250px;
  height: 310px;
  z-index: 4;
  transform: translateX(-50%);
  animation: mentorSync 4.4s ease-in-out infinite;
}

.digital-mentor span {
  position: absolute;
  display: block;
}

.mentor-card {
  inset: 0;
  background: #bdb9ac;
  border: 5px solid #050504;
  box-shadow: 9px 9px 0 #000;
}

.mentor-card::before {
  content: "";
  position: absolute;
  inset: 18px;
  border: 4px solid #050504;
  background:
    linear-gradient(rgba(227, 185, 39, 0.07), rgba(227, 185, 39, 0.04)),
    repeating-linear-gradient(0deg, rgba(5, 5, 4, 0.14) 0 2px, transparent 2px 8px),
    #8e9189;
}

.mentor-bg {
  left: 28px;
  right: 28px;
  top: 28px;
  height: 168px;
  overflow: hidden;
  background:
    linear-gradient(90deg, rgba(20, 33, 39, 0.82), rgba(79, 86, 82, 0.62)),
    repeating-linear-gradient(90deg, transparent 0 34px, rgba(245, 236, 210, 0.2) 34px 38px),
    linear-gradient(#3f4a4d, #747a72);
  border: 4px solid #050504;
}

.mentor-bg::before,
.mentor-bg::after {
  content: "";
  position: absolute;
  bottom: 0;
  background: rgba(17, 17, 15, 0.52);
}

.mentor-bg::before {
  left: 10px;
  width: 46px;
  height: 70px;
}

.mentor-bg::after {
  right: 12px;
  width: 52px;
  height: 92px;
}

.mentor-aura {
  left: 50%;
  top: 52px;
  width: 176px;
  height: 176px;
  border: 3px solid rgba(227, 185, 39, 0.28);
  border-radius: 50%;
  transform: translateX(-50%);
  box-shadow: 0 0 46px rgba(227, 185, 39, 0.24);
}

.mentor-head {
  left: 80px;
  top: 74px;
  width: 92px;
  height: 110px;
  background:
    radial-gradient(circle at 30% 34%, rgba(255, 225, 184, 0.4), transparent 14%),
    radial-gradient(circle at 70% 36%, rgba(93, 54, 32, 0.22), transparent 18%),
    linear-gradient(135deg, #d6a06a, #b9784c 76%);
  border: 5px solid #050504;
  border-radius: 44% 44% 40% 40%;
  box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.82);
}

.mentor-hair {
  left: 74px;
  top: 58px;
  width: 110px;
  height: 62px;
  background:
    radial-gradient(circle at 22% 70%, #5a3a22 0 14%, transparent 15%),
    radial-gradient(circle at 42% 34%, #6c4426 0 18%, transparent 19%),
    linear-gradient(145deg, #302a20 0 48%, #14120e 48% 100%);
  border: 5px solid #050504;
  border-radius: 48px 48px 18px 18px;
  clip-path: polygon(0 22%, 25% 0, 100% 8%, 96% 62%, 72% 52%, 44% 64%, 0 56%);
}

.mentor-face {
  left: 103px;
  top: 116px;
  width: 9px;
  height: 9px;
  color: #050504;
  background: currentColor;
  border-radius: 50%;
  box-shadow:
    36px 0 0 currentColor,
    18px 31px 0 -3px currentColor;
}

.mentor-face::after {
  content: "";
  position: absolute;
  left: 9px;
  top: 25px;
  width: 34px;
  height: 8px;
  border-bottom: 3px solid #050504;
  border-radius: 0 0 18px 18px;
}

.mentor-neck {
  left: 111px;
  top: 180px;
  width: 30px;
  height: 32px;
  background: #b77e52;
  border: 4px solid #050504;
}

.mentor-jacket {
  left: 44px;
  top: 206px;
  width: 162px;
  height: 120px;
  background:
    linear-gradient(90deg, #172329 0 33%, #273d46 33% 66%, #172329 66% 100%);
  border: 5px solid #050504;
  clip-path: polygon(14% 0, 86% 0, 100% 100%, 0 100%);
  box-shadow: 7px 7px 0 #000;
}

.mentor-shirt {

}

.mentor-photo-cycle::before {
  content: "";

  inset: -18px;
  z-index: -1;
  border: 3px solid rgba(227, 185, 39, 0.42);
  box-shadow: 0 0 46px rgba(227, 185, 39, 0.18);

  content: "";
  position: absolute;
  inset: 8px;
  border: 3px solid rgba(227, 185, 39, 0.42);
  pointer-events: none;
}

.mentor-photo {
  position: absolute;
  inset: 12px;
  width: calc(100% - 24px);
  height: calc(100% - 24px);
  object-fit: cover;
  object-position: center top;
  opacity: 0;
  filter: saturate(0.92) contrast(1.04);

.profile-avatar,
.icon-avatar {
  position: relative;
  display: inline-block;
  width: 42px;
  height: 46px;
  flex: 0 0 auto;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.18), transparent 30%),
    #262620;
  border: 3px solid #050504;
  border-radius: 50% 50% 44% 44%;
  box-shadow: 2px 2px 0 #000;
}

.profile-avatar.large {
  width: 64px;
  height: 70px;
}

.avatar-back-hair,
.avatar-hair,
.avatar-face,
.avatar-nose,
.avatar-mouth,
.avatar-glasses,
.avatar-neck,
.avatar-shirt {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.avatar-back-hair {
  top: 9px;
  width: 34px;
  height: 35px;
  background: var(--avatar-hair);
  border-radius: 50% 50% 42% 42%;
  opacity: 0;
  z-index: 0;
}

.profile-avatar.large .avatar-back-hair {
  top: 13px;
  width: 52px;
  height: 54px;
}

.profile-avatar.hair-long .avatar-back-hair,
.profile-avatar.is-female .avatar-back-hair {
  opacity: 1;
}

.avatar-face {
  top: 12px;
  width: 23px;
  height: 25px;
  background: var(--avatar-skin);
  border-radius: 44% 44% 48% 48%;
}

.profile-avatar.large .avatar-face {
  top: 18px;
  width: 35px;
  height: 38px;
}

.avatar-face::before,
.avatar-face::after {
  content: "";
  position: absolute;
  top: 11px;
  width: 3px;
  height: 3px;
  background: #050504;
  border-radius: 50%;
}

.avatar-face::before {
  left: 7px;
}

.avatar-face::after {
  right: 7px;
}

.profile-avatar.large .avatar-face::before,
.profile-avatar.large .avatar-face::after {
  top: 17px;
  width: 4px;
  height: 4px;
}

.profile-avatar.large .avatar-face::before {
  left: 11px;
}

.profile-avatar.large .avatar-face::after {
  right: 11px;
}

.avatar-hair {
  top: 8px;
  width: 31px;
  height: 22px;
  background: var(--avatar-hair);
  border-radius: 50% 50% 34% 34%;
  z-index: 1;
  box-shadow: inset 0 -5px 0 rgba(0, 0, 0, 0.16);
}

.avatar-hair::before,
.avatar-hair::after {
  content: "";
  position: absolute;
  background: var(--avatar-hair);
}

.profile-avatar.large .avatar-hair {
  top: 12px;
  width: 48px;
  height: 33px;
}

.profile-avatar.is-female .avatar-hair {
  height: 28px;
  border-radius: 48% 48% 42% 42%;
}

.profile-avatar.is-female.large .avatar-hair {
  height: 48px;
}

.profile-avatar.is-female .avatar-hair::before,
.profile-avatar.is-female .avatar-hair::after {
  top: 10px;
  width: 7px;
  height: 24px;
  border-radius: 8px;
}

.profile-avatar.is-female .avatar-hair::before {
  left: -1px;
}

.profile-avatar.is-female .avatar-hair::after {
  right: -1px;
}

.profile-avatar.is-female.large .avatar-hair::before,
.profile-avatar.is-female.large .avatar-hair::after {
  top: 15px;
  width: 10px;
  height: 36px;
}

.avatar-face {
  z-index: 2;
}

.avatar-nose {
  top: 25px;
  width: 4px;
  height: 7px;
  background: rgba(0, 0, 0, 0.18);
  border-radius: 60%;
  z-index: 3;
}

.profile-avatar.large .avatar-nose {
  top: 37px;
  width: 5px;
  height: 10px;
}

.avatar-mouth {
  top: 33px;
  width: 11px;
  height: 4px;
  border-bottom: 2px solid rgba(0, 0, 0, 0.42);
  border-radius: 0 0 12px 12px;
  z-index: 3;
}

.profile-avatar.large .avatar-mouth {
  top: 49px;
  width: 16px;
  height: 6px;
  border-bottom-width: 3px;
}

.avatar-glasses {
  display: none;
  top: 24px;
  width: 27px;
  height: 9px;
  border-right: 2px solid #050504;
  border-left: 2px solid #050504;
  border-radius: 8px;
  z-index: 4;
}

.profile-avatar.accessory-glasses .avatar-glasses {
  display: block;
}

.avatar-glasses::before,
.avatar-glasses::after {
  content: "";
  position: absolute;
  top: 0;
  width: 9px;
  height: 8px;
  border: 2px solid #050504;
  border-radius: 50%;
}

.avatar-glasses::before {
  left: -3px;
}

.avatar-glasses::after {
  right: -3px;
}

.profile-avatar.large .avatar-glasses {
  top: 36px;
  width: 41px;
  height: 13px;
}

.profile-avatar.large .avatar-glasses::before,
.profile-avatar.large .avatar-glasses::after {
  width: 14px;
  height: 12px;
}

.avatar-neck {
  top: 34px;
  width: 10px;
  height: 8px;
  background: var(--avatar-skin);
}

.profile-avatar.large .avatar-neck {
  top: 52px;
  width: 15px;
  height: 12px;
}

.avatar-shirt {
  bottom: -11px;
  width: 40px;
  height: 20px;
  background: var(--avatar-outfit);
  border-radius: 50% 50% 0 0;
  z-index: 1;

.profile-avatar.large .avatar-shirt {
  bottom: -16px;

.profile-avatar.hair-side .avatar-hair {

.profile-avatar.hair-side .avatar-hair::before {
  content: "";
  position: absolute;

  width: 2px;
  height: 16px;

.profile-avatar.large.hair-side .avatar-hair::before {

.profile-avatar.hair-long .avatar-hair {

  content: "";

  opacity: 0.35;

}

  top: 50%;

}

.start-node.node-b {

}

.start-node.node-c {

}

.start-node.node-d {

.start-title-panel p {

function hashString(value) {
  return String(value).split("").reduce((hash, char) => {
    const next = (hash << 5) - hash + char.charCodeAt(0);
    return next | 0;
  }, 0);
}

function seededShuffle(items, seed) {
  const result = [...items];
  let currentSeed = Math.abs(hashString(seed)) || 1;
  for (let index = result.length - 1; index > 0; index -= 1) {
    currentSeed = (currentSeed * 9301 + 49297) % 233280;
    const swapIndex = Math.floor((currentSeed / 233280) * (index + 1));
    [result[index], result[swapIndex]] = [result[swapIndex], result[index]];
  }
  return result;
}

function orderedBranches(caseId = state.currentCaseId, format = state.selectedFormat) {
  const branches = branchesFor(caseId, format);
  const key = `${state.sessionId}:${caseId}:${format}`;
  if (!state.optionOrders[key]) {
    const indexes = seededShuffle(branches.map((_, index) => index), key);
    state.optionOrders[key] = indexes;
  }
  return state.optionOrders[key]
    .map((sourceIndex) => ({ branch: branches[sourceIndex], sourceIndex }))
    .filter((item) => item.branch);
}

function findBranchBySourceIndex(index) {

    if (!current?.parent || current.parent === current) break;
    current = current.parent;
  }
  return win.opener?.API_1484_11 || null;
}

function scormDiagnostic(action, error = "") {
  const code = scorm.api?.GetLastError?.() || "";
  const message = code && code !== "0" ? scorm.api?.GetErrorString?.(code) || "" : "";
  scorm.diagnostics.push({
    action,
    code,
    message,
    error: error ? String(error) : "",
    timestamp: new Date().toISOString(),
  });
  if (scorm.diagnostics.length > 20) scorm.diagnostics.shift();
}

function scormSessionDuration() {
  if (!scorm.sessionStartedAt) return "PT0S";
  const seconds = Math.max(0, Math.round((Date.now() - scorm.sessionStartedAt) / 1000));
  const hours = Math.floor(seconds / 3600);
  const minutes = Math.floor((seconds % 3600) / 60);
  const rest = seconds % 60;
  return `PT${hours ? `${hours}H` : ""}${minutes ? `${minutes}M` : ""}${rest}S`;
}

function scormInitialize() {
  if (scorm.initialized) return;
  scorm.api = findScormAPI();
  if (!scorm.api) return;
  try {
    const result = scorm.api.Initialize("");
    if (result !== true && result !== "true") {
      scormDiagnostic("Initialize");
      scorm.api = null;
      return;
    }
    scorm.initialized = true;
    scorm.sessionStartedAt = Date.now();
    scorm.interactionIndex = Number.parseInt(scormGet("cmi.interactions._count"), 10) || 0;
    const completion = scormGet("cmi.completion_status");
    const success = scormGet("cmi.success_status");
    if (!completion || completion === "unknown" || completion === "not attempted") scormSet("cmi.completion_status", "incomplete");
    if (!success || success === "unknown") scormSet("cmi.success_status", "unknown");
    scormCommit();
  } catch (error) {
    scormDiagnostic("Initialize", error);
    scorm.api = null;
  }
}

function scormSet(key, value) {
  if (!scorm.api || scorm.terminated) return false;
  try {
    const result = scorm.api.SetValue(key, String(value));
    if (result !== true && result !== "true") scormDiagnostic(`SetValue:${key}`);
    return result === true || result === "true";
  } catch (error) {
    scormDiagnostic(`SetValue:${key}`, error);
    return false;
  }
}

function scormGet(key) {
  if (!scorm.api) return "";
  try {
    return scorm.api.GetValue(key) || "";
  } catch (error) {
    scormDiagnostic(`GetValue:${key}`, error);

function scormCommit() {

    if (scorm.sessionStartedAt) scormSet("cmi.session_time", scormSessionDuration());
    const result = scorm.api.Commit("");

  } catch (error) {

}

function persistAnalyticsState() {
  try {
    localStorage.setItem(analyticsStorageKey("events"), JSON.stringify(state.analytics.events));
    localStorage.setItem(analyticsStorageKey("pending"), JSON.stringify(state.analytics.pending));
    // Совместимость с прежней выгрузкой владельца симуляции.
    localStorage.setItem("kredoLeaderDashboardEvents", JSON.stringify(state.analytics.events));
  } catch (error) {}
}

function analyticsEventId() {
  return `evt-${Date.now()}-${Math.random().toString(16).slice(2)}`;
}

async function flushAnalyticsQueue() {
  if (!state.analytics.endpoint || !state.analytics.pending.length) return;
  const queue = [...state.analytics.pending];
  for (const event of queue) {
    try {
      const response = await fetch(state.analytics.endpoint, {
        method: "POST",
        credentials: "include",
        headers: {
          "Content-Type": "application/json",
          "X-Kredo-Leader-Package": runtimeConfig.packageId || state.currentSimulationId,
        },
        body: JSON.stringify(event),
        keepalive: true,
      });
      if (!response.ok) break;
      state.analytics.pending = state.analytics.pending.filter((item) => item.eventId !== event.eventId);
      persistAnalyticsState();
    } catch (error) {
      break;
    }
  }
}

function loadAnalyticsState() {
  try {
    const storedEvents = localStorage.getItem(analyticsStorageKey("events"));
    const legacyEvents = localStorage.getItem("kredoLeaderDashboardEvents");
    state.analytics.events = JSON.parse(storedEvents || legacyEvents || "[]");
    state.analytics.pending = JSON.parse(localStorage.getItem(analyticsStorageKey("pending")) || "[]");
  } catch (error) {
    state.analytics.events = [];
    state.analytics.pending = [];
  }
}

function trackEvent(type, payload = {}) {
  const event = {
    eventId: analyticsEventId(),
    sessionId: state.sessionId,
    packageId: runtimeConfig.packageId,
    learner: scormLearnerProfile(),
    type,
    screen: state.screen,
    simulationId: state.currentSimulationId,
    caseId: state.currentCaseId,
    timestamp: new Date().toISOString(),
    payload,
  };
  state.analytics.events.push(event);
  state.analytics.pending.push(event);
  if (state.analytics.pending.length > ANALYTICS_QUEUE_LIMIT) state.analytics.pending.shift();
  persistAnalyticsState();
  if (type === "decision") {
    const index = scorm.interactionIndex++;
    scormSet(`cmi.interactions.${index}.id`, `case-${payload.caseId}-${index}`);
    scormSet(`cmi.interactions.${index}.type`, "choice");
    scormSet(`cmi.interactions.${index}.learner_response`, payload.strategy || payload.text || "");
    scormSet(`cmi.interactions.${index}.result`, (payload.score || 0) >= 4 ? "correct" : "incorrect");
    scormSet(`cmi.interactions.${index}.description`, `${payload.format || ""}: ${payload.text || ""}`.slice(0, 250));
    scormCommit();
  }
  void flushAnalyticsQueue();
  return event;
}

function trackCaseStarted(caseId, source = "navigation") {
  const key = `${state.sessionId}:${caseId}`;
  if (state.analytics.startedCases.includes(key)) return;
  state.analytics.startedCases.push(key);
  const caseItem = state.data?.cases?.find((item) => item.id === caseId);
  trackEvent("case_started", {
    caseId,
    title: caseItem?.title || `Кейс ${caseId}`,
    source,
  });
}

function suspendSnapshot() {
  return {
    version: SCORM_SUSPEND_VERSION,
    sessionId: state.sessionId,
    currentSimulationId: state.currentSimulationId,
    currentCaseId: state.currentCaseId,
    metrics: state.metrics,
    selectedFormat: state.selectedFormat,
    selectedBranch: state.selectedBranch,
    finalOutcome: state.finalOutcome,
    mapAnswers: state.mapAnswers,
    mapStage: state.mapStage,
    mapErrors: state.mapErrors,
    mapStageErrors: state.mapStageErrors,
    channelErrors: state.channelErrors,
    formErrors: state.formErrors,
    decisionHistory: state.decisionHistory,
    optionOrders: state.optionOrders,
    finalTracked: state.finalTracked,
    screen: state.screen,
    route: state.route,
    player: {
      ...state.player,
      portrait: state.player.customPortrait ? "" : state.player.portrait,
      customPortrait: false,
    },
    teamStats: state.teamStats,
    analytics: { startedCases: state.analytics.startedCases },
  };
}

function saveScormProgress() {
  if (!scorm.api || scorm.terminated) return;
  const snapshot = suspendSnapshot();
  let payload = JSON.stringify(snapshot);
  if (new TextEncoder().encode(payload).length > 60000) {
    snapshot.optionOrders = {};
    snapshot.decisionHistory = snapshot.decisionHistory.map(({ caseId, format, score, delta, strategy, orderPosition }) => ({ caseId, format, score, delta, strategy, orderPosition }));
    payload = JSON.stringify(snapshot);
  }
  if (new TextEncoder().encode(payload).length <= 64000) {
    scormSet("cmi.suspend_data", payload);
    scormSet("cmi.location", `${state.currentSimulationId}:${state.currentCaseId}:${state.screen}`);
  } else {
    scormDiagnostic("suspend_data", "Snapshot exceeds the SCORM 2004 64 KB limit");
  }
}

function restoreScormProgress() {
  const raw = scormGet("cmi.suspend_data");
  if (!raw) return false;
  try {
    const snapshot = JSON.parse(raw);
    if (snapshot.version !== SCORM_SUSPEND_VERSION || snapshot.currentSimulationId !== "conflict") return false;
    const allowed = [
      "sessionId", "currentSimulationId", "currentCaseId", "metrics", "selectedFormat", "selectedBranch",
      "finalOutcome", "mapAnswers", "mapStage", "mapErrors", "mapStageErrors", "channelErrors", "formErrors",
      "decisionHistory", "optionOrders", "finalTracked", "screen", "route", "teamStats",
    ];
    allowed.forEach((key) => {
      if (snapshot[key] !== undefined) state[key] = snapshot[key];
    });
    if (snapshot.player) state.player = { ...state.player, ...snapshot.player, customPortrait: false };
    state.analytics.startedCases = Array.isArray(snapshot.analytics?.startedCases) ? snapshot.analytics.startedCases : [];
    scorm.resumed = true;
    return true;
  } catch (error) {
    scormDiagnostic("restore_suspend_data", error);
    return false;
  }
}

function terminateScorm() {
  if (!scorm.api || scorm.terminated) return;
  saveScormProgress();
  scormCommit();
  void flushAnalyticsQueue();
  try {
    const result = scorm.api.Terminate("");
    if (result !== true && result !== "true") scormDiagnostic("Terminate");
  } catch (error) {
    scormDiagnostic("Terminate", error);
  }
  scorm.terminated = true;
}

function completeScorm(profile) {
  const normalized = Math.round((profile.avgScore || 0) * 20);
  scormSet("cmi.score.min", 0);
  scormSet("cmi.score.max", 100);
  scormSet("cmi.score.raw", normalized);
  scormSet("cmi.score.scaled", Math.max(0, Math.min(1, normalized / 100)).toFixed(2));
  scormSet("cmi.completion_status", "completed");
  scormSet("cmi.success_status", normalized >= 70 ? "passed" : "failed");
  scormSet("cmi.progress_measure", "1");
  saveScormProgress();
  scormCommit();
}

function analyticsSummary() {
  const decisions = state.analytics.events.filter((item) => item.type === "decision");
  const early = decisions.slice(0, Math.ceil(decisions.length / 2));
  const late = decisions.slice(Math.ceil(decisions.length / 2));
  const avg = (items) => items.length
    ? (items.reduce((sum, item) => sum + (item.payload.score || 0), 0) / items.length).toFixed(1)
    : "0.0";
  return {
    decisions: decisions.length,
    earlyAvg: avg(early),
    lateAvg: avg(late),
    risky: decisions.filter((item) => (item.payload.score || 0) <= 2).length,
    endpoint: state.analytics.endpoint || "не подключён",
  };
}

        ...events.map((event) => [
          event.sessionId,
          event.timestamp,

          event.simulationId,
          event.caseId,
          event.payload?.format || "",
          event.payload?.strategy || "",
          event.payload?.score ?? "",
          event.payload?.orderPosition ?? "",
          `"${String(event.payload?.text || "").replace(/"/g, '""')}"`,
        ].join(",")),
      ].join("\n")
    : JSON.stringify({ sessionId: state.sessionId, events }, null, 2);
  const blob = new Blob([content], { type: format === "csv" ? "text/csv;charset=utf-8" : "application/json;charset=utf-8" });

  link.href = URL.createObjectURL(blob);

async function tryAiPortraitAdapter(file) {
  const controller = new AbortController();
  const timeout = window.setTimeout(() => controller.abort(), 12000);
  const form = new FormData();
  form.append("photo", file);
  form.append("style", "conflict-simulation-team-card");
  form.append("gender", state.player.gender);
  form.append("prompt", [
    "Transform the uploaded person photo into a cohesive team-card portrait.",
    "Keep likeness and face orientation, but redraw it as a semi-realistic corporate game portrait.",
    "Use muted bank office background, warm black and gold palette, painterly detail, no pixel art.",
    "Return a cropped vertical portrait matching the existing employee cards."
  ].join(" "));

  try {
    const response = await fetch("/api/adapt-portrait", {
      method: "POST",
      body: form,
      signal: controller.signal
    });
    if (!response.ok) return "";
    const data = await response.json();
    return data.portrait || data.image || data.url || "";
  } catch (error) {
    return "";
  } finally {
    window.clearTimeout(timeout);
  }
}

async function createUnifiedPortrait(file) {
  const aiPortrait = await tryAiPortraitAdapter(file);
  if (aiPortrait) return aiPortrait;

}

function adaptPhotoToTeamStyle(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.addEventListener("error", reject);
    reader.addEventListener("load", () => {
      const image = new Image();
      image.addEventListener("error", reject);
      image.addEventListener("load", () => {
        const width = 178;
        const height = 205;
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");
        canvas.width = width;
        canvas.height = height;

        const sourceRatio = image.width / image.height;
        const targetRatio = width / height;
        const sourceWidth = sourceRatio > targetRatio ? image.height * targetRatio : image.width;
        const sourceHeight = sourceRatio > targetRatio ? image.height : image.width / targetRatio;
        const sourceX = (image.width - sourceWidth) / 2;
        const sourceY = (image.height - sourceHeight) / 2;

        const bg = ctx.createLinearGradient(0, 0, width, height);
        bg.addColorStop(0, "#5f625c");
        bg.addColorStop(0.58, "#34362f");
        bg.addColorStop(1, "#151512");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, width, height);

        const painted = document.createElement("canvas");
        const paintedCtx = painted.getContext("2d");
        painted.width = width;
        painted.height = height;
        paintedCtx.filter = "saturate(0.7) contrast(1.28) brightness(0.9) sepia(0.16)";
        paintedCtx.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, 0, 0, width, height);
        paintedCtx.filter = "none";

        const imageData = paintedCtx.getImageData(0, 0, width, height);
        const data = imageData.data;
        const original = new Uint8ClampedArray(data);
        for (let index = 0; index < data.length; index += 4) {
          const gray = data[index] * 0.28 + data[index + 1] * 0.48 + data[index + 2] * 0.24;
          const shadow = gray < 80 ? -16 : gray > 190 ? 8 : 0;
          data[index] = Math.min(235, Math.round((data[index] * 0.72 + gray * 0.28 + shadow + 8) / 22) * 22);
          data[index + 1] = Math.min(228, Math.round((data[index + 1] * 0.66 + gray * 0.34 + shadow + 4) / 22) * 22);
          data[index + 2] = Math.min(218, Math.round((data[index + 2] * 0.58 + gray * 0.42 + shadow) / 22) * 22);
        }
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const index = (y * width + x) * 4;
            const left = (y * width + x - 1) * 4;
            const right = (y * width + x + 1) * 4;
            const top = ((y - 1) * width + x) * 4;
            const bottom = ((y + 1) * width + x) * 4;
            const currentGray = original[index] * 0.3 + original[index + 1] * 0.5 + original[index + 2] * 0.2;
            const edge =
              Math.abs(currentGray - (original[left] * 0.3 + original[left + 1] * 0.5 + original[left + 2] * 0.2)) +
              Math.abs(currentGray - (original[right] * 0.3 + original[right + 1] * 0.5 + original[right + 2] * 0.2)) +
              Math.abs(currentGray - (original[top] * 0.3 + original[top + 1] * 0.5 + original[top + 2] * 0.2)) +
              Math.abs(currentGray - (original[bottom] * 0.3 + original[bottom + 1] * 0.5 + original[bottom + 2] * 0.2));
            if (edge > 88) {
              data[index] = Math.max(0, data[index] - 48);
              data[index + 1] = Math.max(0, data[index + 1] - 48);
              data[index + 2] = Math.max(0, data[index + 2] - 48);
            }
          }
        }
        paintedCtx.putImageData(imageData, 0, 0);

        const low = document.createElement("canvas");
        const lowCtx = low.getContext("2d");
        low.width = 90;
        low.height = 104;
        lowCtx.imageSmoothingEnabled = true;
        lowCtx.drawImage(painted, 0, 0, low.width, low.height);

        ctx.save();
        ctx.imageSmoothingEnabled = false;
        ctx.globalAlpha = 0.96;
        ctx.drawImage(low, 0, 0, width, height);
        ctx.restore();

        ctx.globalCompositeOperation = "overlay";
        ctx.fillStyle = "rgba(215, 191, 121, 0.12)";
        ctx.fillRect(0, 0, width, height);
        ctx.globalCompositeOperation = "source-over";

        ctx.globalCompositeOperation = "multiply";
        const vignette = ctx.createRadialGradient(width / 2, height * 0.42, 28, width / 2, height * 0.45, 122);
        vignette.addColorStop(0, "rgba(255, 255, 255, 0)");
        vignette.addColorStop(1, "rgba(0, 0, 0, 0.42)");
        ctx.fillStyle = vignette;
        ctx.fillRect(0, 0, width, height);
        ctx.fillStyle = "rgba(12, 12, 10, 0.16)";
        for (let y = 0; y < height; y += 3) ctx.fillRect(0, y, width, 1);
        ctx.fillStyle = "rgba(227, 185, 39, 0.06)";
        for (let x = 1; x < width; x += 5) ctx.fillRect(x, 0, 1, height);
        ctx.globalCompositeOperation = "source-over";
        ctx.fillStyle = "rgba(0, 0, 0, 0.25)";
        ctx.fillRect(0, 0, width, 7);
        ctx.fillRect(0, height - 7, width, 7);
        ctx.fillRect(0, 0, 7, height);
        ctx.fillRect(width - 7, 0, 7, height);
        ctx.strokeStyle = "#050504";
        ctx.lineWidth = 6;
        ctx.strokeRect(3, 3, width - 6, height - 6);
        resolve(canvas.toDataURL("image/png"));
      });
      image.src = reader.result;
    });
    reader.readAsDataURL(file);
  });
}

  const complete = experience.solutionParts.every((part) => state.motivation.solution[part.id]);
  const selectedTexts = experience.solutionParts
    .map((part) => part.options.find((option) => option.id === state.motivation.solution[part.id])?.text)
    .filter(Boolean);
  return `
    <section class="motivation-stage">
      <span class="motivation-eyebrow">Конструктор решения</span>
      <h2>Собери решение из трёх управленческих действий</h2>
      <p class="motivation-lead">Собери решение, которое изменит нагрузку, учтёт вклад Дениса и вернёт ему возможность влиять на работу.</p>
      <div class="solution-builder">
        ${experience.solutionParts
          .map(
            (part) => `
              <fieldset>
                <legend><b>${part.title}</b><span>${part.prompt}</span></legend>
                ${part.options
                  .map(
                    (option) => `
                      <button class="${state.motivation.solution[part.id] === option.id ? "selected" : ""}" type="button" data-solution-part="${part.id}" data-solution-option="${option.id}">
                        ${option.text}
                      </button>
                    `,
                  )
                  .join("")}
              </fieldset>
            `,
          )
          .join("")}
      </div>
      ${
        selectedTexts.length
          ? `<div class="solution-preview"><strong>Твоё решение</strong><ol>${selectedTexts.map((text) => `<li>${text}</li>`).join("")}</ol></div>`
          : ""
      }
      ${complete ? `<button class="motivation-primary" type="button" data-motivation-action="promise">Зафиксировать договорённость</button>` : ""}
    </section>
  `;
}

function currentMapVisibleCount() {
  return mapStageCounts[state.mapStage] || mapStageCounts[0];
}

function currentMapStartIndex() {
  return state.mapStage === 0 ? 0 : mapStageCounts[state.mapStage - 1];
}

function mapQuestionTitle(index) {
  const [sideOne, sideTwo] = currentMapSideLabels();
  const titles = [
    "Стороны конфликта",
    "Причина конфликта",
    `Интересы: ${sideOne}`,
    `Интересы: ${sideTwo}`,
    `Опасения: ${sideOne}`,
    `Опасения: ${sideTwo}`,
  ];
  return titles[index] || "Элемент карты";
}

function mapProgressText() {
  const labels = ["Сначала определите стороны конфликта", "Теперь найдите причину конфликта", "Теперь разберите интересы сторон", "Теперь зафиксируйте опасения сторон"];
  return labels[state.mapStage] || labels[0];
}

function mapView() {
  const questions = state.data.maps[String(state.currentCaseId)] || [];
  const visibleCount = currentMapVisibleCount();
  const currentStart = currentMapStartIndex();
  const visibleQuestions = questions.slice(0, visibleCount);
  const showAnswerKey = (state.mapStageErrors[state.mapStage] || 0) >= 2;
  updateFrame("Карта конфликта");
  view.innerHTML = `
    <div class="messenger-layout">
      ${chatSidebar("map")}
      <section class="chat-window">
        <header class="chat-header">
          <span class="mail-badge">${uiIcon("map")}</span>
          <div><strong>Карта конфликта</strong><span>${mapProgressText()}</span></div>
        </header>
        <div class="map-grid">
          <div class="map-progress">
            ${mapStageCounts
              .map((_, index) => `<span class="${index <= state.mapStage ? "active" : ""}"></span>`)
              .join("")}
          </div>
          ${visibleQuestions
            .map(
              (question, qi) => `
                <fieldset class="map-question ${showAnswerKey && qi >= currentStart ? "show-answer" : ""}">
                  <h3>${mapQuestionTitle(qi)}</h3>
                  <p>${question.hint || ""}</p>
                  ${question.options
                    .map(
                      (option, oi) => `
                        <label class="radio-row ${showAnswerKey && qi >= currentStart && question.correct === oi + 1 ? "correct-answer" : ""}">
                          <input type="radio" name="q${qi}" value="${oi + 1}" ${state.mapAnswers[qi] === oi + 1 ? "checked" : ""} />
                          ${oi + 1}. ${option}
                        </label>
                      `,
                    )
                    .join("")}
                </fieldset>
              `,
            )
            .join("")}
        </div>
        ${
          showAnswerKey
            ? `
              <article class="map-answer-guide">
                <strong>Подсказка к текущему шагу</strong>
                <p>Сейчас подсвечены только правильные варианты в текущем блоке карты. Завершите этот шаг верно, и только после этого откроется следующий слой разбора.</p>
              </article>
            `
            : ""
        }
        ${teamSpotlightHTML()}
        <footer class="composer">
          <button type="button" data-action="mapTheory">Изучить теорию</button>
          <button type="button" data-action="checkMap">${visibleCount >= questions.length ? "Подтвердить карту" : "Продолжить"}</button>
        </footer>
      </section>
    </div>
  `;
}

const teamMetricMeta = {
  engagement: { label: "Вовлечённость", risk: false },
  load: { label: "Нагрузка", risk: true },
  tension: { label: "Напряжение", risk: true },
};

const teamMetricIcons = {
  engagement: "engagement",
  load: "load",
  tension: "tension",
};

function teamMetricRows(stats) {
  return Object.entries(teamMetricMeta)
    .map(([key, meta]) => {
      const value = stats[key];
      return `
        <div class="team-stat ${meta.risk ? "risk" : ""}">
          <span>${uiIcon(teamMetricIcons[key], "metric-icon")}${meta.label}</span>
          <b>${value}</b>
          <div class="bar"><span style="width:${value}%"></span></div>
        </div>
      `;
    })
    .join("");
}

function memberEmotion(stats) {
  if (stats.tension >= 65) {
    return {
      tone: "tense",
      label: "Высокое напряжение",
      state: "Я сейчас насторожен и быстрее считываю давление. Если со мной говорить формально или жёстко, я скорее уйду в защиту, чем честно назову причину напряжения.",
    };
  }
  if (stats.load >= 75) {
    return {
      tone: "overload",
      label: "Перегруз",
      state: "Я держусь, но ресурса на дополнительные задачи почти нет. Если нагрузка ещё вырастет, я начну экономить силы и помогать только там, где это напрямую входит в мои обязанности.",
    };
  }
  if (stats.engagement >= 74 && stats.tension <= 42) {
    return {
      tone: "stable",
      label: "Вовлечён",
      state: "Я готов включаться, если вижу уважение к своему вкладу и понятные правила. Тогда я не просто выполняю задачу, а помогаю удерживать общий результат команды.",
    };
  }
  if (stats.engagement < 58) {
    return {
      tone: "low",
      label: "Демотивация",
      state: "Я сомневаюсь, что мою позицию услышат, поэтому осторожнее беру инициативу. Мне нужен не общий призыв, а конкретный сигнал, что ситуация действительно изменится.",
    };
  }
  return {
    tone: "mixed",
    label: "Осторожная готовность",
    state: "Я наблюдаю за решениями руководителя и жду, станет ли процесс безопаснее. Готов попробовать, но мне важно увидеть следующий шаг, а не только правильные слова.",
  };
}

function nextCaseForMember(memberName) {
  return state.data.cases
    .filter((item) => item.id >= state.currentCaseId)
    .find((item) => namesInCase(item).includes(memberName));
}

function memberSpeech(member, stats, emotion) {
  const current = currentCase();
  const currentNames = namesInCase(current);
  const isInCurrent = currentNames.includes(member.name);
  const upcoming = nextCaseForMember(member.name);
  const phase = state.screen;

function namesInCase(item) {
  const text = `${item?.participants || ""} ${item?.title || ""} ${item?.subject || ""}`;
  return teamMembers()
    .filter((member) => text.includes(member.name))
    .map((member) => member.name);
}

function applyTeamImpact(branch) {
  const caseItem = state.data.cases.find((item) => item.id === branch.caseId) || currentCase();
  const affected = new Set(namesInCase(caseItem));
  const score = branch.score || 0;
  const delta = branch.delta || {};
  const trustShift = Math.round((delta.trust || 0) / 3);
  const conflictShift = Math.round((delta.hiddenConflict || 0) / 2);
  const turnoverShift = Math.round((delta.turnover || 0) / 2);
  const loadShift = Math.round(-((delta.sla || 0) + (delta.quality || 0)) / 4);

  teamMembers().forEach((member) => {
    const stats = state.teamStats[member.name];
    if (!stats) return;
    const weight = affected.has(member.name) ? 1 : 0.35;
    const scoreShift = (score - 3) * weight;
    stats.engagement = clamp(Math.round(stats.engagement + trustShift * weight - turnoverShift * weight + scoreShift));
    stats.load = clamp(Math.round(stats.load + loadShift * weight + Math.max(0, -scoreShift)));
    stats.tension = clamp(Math.round(stats.tension + conflictShift * weight + turnoverShift * weight - scoreShift));
  });
}

function applyBranch(branch, orderPosition = null) {
  if (window.trackSimulationEvent && branch) {
    window.trackSimulationEvent("option_selected", {
      simulation_id: window.CurrentSimulation?.id || "default-conflict-simulation",
      case_id: branch.caseId || state.currentCaseId,
      branch_id: branch.id || null,
      order_position: orderPosition,
      format: state.selectedFormat || null,
      strategy: branch.strategy || null,
      score: branch.score || null,
      metric_delta: branch.delta || null,
      option_text: branch.text || null
    });
  }

  state.selectedBranch = branch;
  const metricsBefore = { ...state.metrics };
  Object.entries(branch.delta).forEach(([key, value]) => {
    state.metrics[key] = clamp(state.metrics[key] + value);
  });
  const metricDeltas = Object.keys(branch.delta || {}).map((metricId) => ({
    metricId,
    before: metricsBefore[metricId],
    delta: branch.delta[metricId],
    after: state.metrics[metricId],
  }));
  applyTeamImpact(branch);
  state.decisionHistory.push({
    caseId: branch.caseId,
    format: branch.format,
    text: branch.text,
    score: branch.score || 0,
    delta: { ...branch.delta },
    strategy: kilmannStrategy(branch).name,
    orderPosition,
  });
  trackEvent("decision", {
    caseId: branch.caseId,
    branchId: branch.id || `${branch.caseId}-${branch.format}-${orderPosition ?? "selected"}`,
    format: branch.format,
    text: branch.text,
    score: branch.score || 0,
    delta: { ...branch.delta },
    strategy: kilmannStrategy(branch).name,
    orderPosition,
    optionOrder: orderedBranches(branch.caseId, branch.format).map((item) => item.sourceIndex),
  });
  metricDeltas.forEach((metric) => trackEvent("metric_changed", {
    caseId: branch.caseId,
    branchId: branch.id || `${branch.caseId}-${branch.format}-${orderPosition ?? "selected"}`,
    ...metric,
  }));
  trackEvent("case_completed", {
    caseId: branch.caseId,
    branchId: branch.id || `${branch.caseId}-${branch.format}-${orderPosition ?? "selected"}`,
    format: branch.format,
    strategy: kilmannStrategy(branch).name,
    score: branch.score || 0,
    metricDeltas,
  });
  if ((branch.score || 0) < 5) state.formErrors += 1;
  if (String(branch.nextCase).startsWith("Финал")) state.finalOutcome = branch.nextCase;
  push("result");
}

function kilmannStrategy(branch) {
  const text = branch.text || "";
  const score = branch.score || 0;
  if (score >= 5) {
    return {
      name: "Сотрудничество",
      tone: "effective",
      description: "Ты одновременно признал интересы сильного сотрудника и потребность команды в безопасной поддержке. Это самая продуктивная стратегия, когда нужно убрать корень конфликта, а не просто погасить симптом.",
    };
  }
  if (score === 4) {
    return {
      name: "Компромисс",
      tone: "neutral",
      description: "Ты выбрал рабочее промежуточное решение. Оно снижает остроту и помогает двигаться дальше, но не полностью решает вопрос ответственности, нагрузки и устойчивого процесса.",
    };
  }
  if (score === 3 || text.includes("посмотрим") || text.includes("вернёмся")) {
    return {
      name: "Избегание",
      tone: "risky",
      description: "Ты отложил прямое вмешательство. Это может временно снизить давление, но команда не получает понятного правила, а скрытое напряжение продолжает жить в обходных каналах.",
    };
  }
  if (score <= 1 || text.includes("Ожидаю") || text.includes("неприемлем")) {
    return {
      name: "Соперничество",
      tone: "risky",
      description: "Ты сделал ставку на давление и контроль. Такая стратегия может казаться быстрой, но в конфликте вокруг статуса и признания она часто усиливает оборону, саботаж и недоверие.",
    };
  }
  return {
    name: "Приспособление",
    tone: "risky",
    description: "Ты сгладил конфликт общими словами и не назвал адресно корневую проблему. Это снижает ясность: сотрудники видят, что напряжение заметили, но не понимают, что именно изменится.",
  };
}

function metricExplanation(key, value, branch, strategy) {
  const formatPart = `Формат «${branch.format}»`;
  const sign = value > 0 ? "изменилась на +" : value < 0 ? "изменилась на -" : "не изменилась";
  const abs = Math.abs(value);
  const byKey = {
    trust: value > 0
      ? `${formatPart} повысил доверие, потому что в ответе есть признание интересов сторон и попытка сделать обсуждение безопасным.`
      : `${formatPart} снизил доверие, потому что команда считывает в ответе давление, формальность или уход от конкретной проблемы.`,
    sla: value > 0
      ? `${formatPart} помогает SLA: решение делает дальнейшие действия более предсказуемыми и сокращает зависание вопросов.`
      : `${formatPart} бьёт по SLA: проблема передачи знаний остаётся неуправляемой, поэтому вопросы продолжают тормозить работу.`,
    quality: value > 0
      ? `Качество растёт, потому что выбранное действие поддерживает более понятную эскалацию и меньше ошибок в спорных кейсах.`
      : `Качество падает, потому что люди по-прежнему могут избегать вопросов или решать спорные кейсы без нормальной поддержки.`,
    turnover: value > 0
      ? `Риск текучести вырос: стратегия «${strategy.name}» усиливает усталость, несправедливость или ощущение небезопасности.`
      : `Риск текучести снизился: стратегия «${strategy.name}» уменьшает давление на людей и показывает, что вклад команды будет учтён.`,
    hiddenConflict: value > 0
      ? `Скрытый конфликт вырос: напряжение не проговорено безопасно или решение воспринимается как формальное.`
      : `Скрытый конфликт снизился: выбранное действие выводит проблему из кулуаров в понятный рабочий процесс.`,
  };
  if (value === 0) return `Метрика «${state.data.metrics[key].label}» не изменилась: выбранное действие почти не затронуло этот фактор.`;
  return `Метрика «${state.data.metrics[key].label}» ${sign}${abs}: ${byKey[key]}`;
}

function nextStepExplanation(branch) {
  const next = resolveNextCaseId(branch.nextCase);
  if (!next) {
    return "Это решение завершает текущую траекторию и переводит тебя к итоговому ИПР.";
  }
  const nextItem = state.data.cases.find((item) => item.id === next);
  if (!nextItem) return "";
  const score = branch.score || 0;
  const lead = score >= 5
    ? "Сильное решение снизило остроту конфликта, поэтому открывается следующий управленческий слой."
    : score >= 4
      ? "Решение частично стабилизировало ситуацию, но оставило рабочий узел, который проявится дальше."
      : score >= 3
        ? "Ты отложил часть вмешательства, поэтому напряжение переходит в следующую форму."
        : "Решение усилило риск, поэтому команда сталкивается с более сложным последствием.";
  return `${lead} Следующая ситуация: «${nextItem.title}».`;
}

function finalOutcome() {
  const outcome = state.finalOutcome || leaderType();
  if (outcome.includes("A")) {
    return {
      title: "Финал A — восстановление команды",
      text: "Ты удержал баланс между операционным результатом, доверием и системной работой с конфликтом. Команда видит, что напряжение можно обсуждать безопасно, а решения не сводятся к наказанию или формальному контролю.",
    };
  }
  if (outcome.includes("B")) {
    return {
      title: "Финал B — частичная стабилизация",
      text: "Команда продолжает работать устойчиво, но часть причин конфликта осталась под поверхностью. Показатели не обрушились, однако доверие и качество взаимодействия требуют регулярного сопровождения.",
    };
  }
  if (outcome.includes("C")) {
    return {
      title: "Финал C — затяжной спад",
      text: "Решения сдержали открытый кризис, но не восстановили командную среду. Скрытое напряжение, осторожность в коммуникации и усталость сильных сотрудников будут постепенно снижать качество работы.",
    };
  }
  if (outcome.includes("D")) {
    return {
      title: "Финал D — эскалация кризиса",
      text: "Команда вошла в зону управленческого риска: доверие снижено, напряжение стало системным, а отдельные решения усилили ощущение небезопасности. Нужен план восстановления, а не точечная реакция.",
    };
  }
  return {
    title: leaderType(),
    text: finalText(),
  };
}

function leaderType() {
  if (state.metrics.trust >= 60 && state.metrics.sla >= 75 && state.metrics.hiddenConflict <= 35) return "Гибкий наставник";
  if (state.metrics.turnover >= 75 || state.metrics.trust <= 30) return "Кризисный руководитель";
  return "Компромиссный руководитель";
}

function checkNoReturn() {
  const m = state.metrics;
  if (m.trust <= 25 && m.sla <= 60 && m.quality <= 70) return "Комбинированный коллапс";
  if (m.turnover >= 75) return "Потеря команды";
  if (m.trust <= 25) return "Разрушение доверия";
  if (m.hiddenConflict >= 80) return "Скрытая эскалация";
  if (m.quality <= 70) return "Кризис качества";
  if (m.sla <= 60) return "Операционный провал";
  return "";
}

function finalText() {
  if (leaderType() === "Гибкий наставник") {
    return "Ты удерживаешь баланс между результатом, доверием и системной работой с конфликтом.";
  }
  if (leaderType() === "Кризисный руководитель") {
    return "Накопленные решения привели команду к зоне высокого риска. Нужна работа с картой конфликта и формой коммуникации.";
  }
  return "Ты находишь рабочие промежуточные решения, но часть причин конфликта остаётся не устранённой.";
}

function developmentPlan() {
  return developmentProfile().plan.map((item) => item.action);
}

function decisionRecords() {
  if (state.decisionHistory.length) return state.decisionHistory;
  if (!state.selectedBranch) return [];
  return [
    {
      caseId: state.selectedBranch.caseId,
      format: state.selectedBranch.format,
      text: state.selectedBranch.text,
      score: state.selectedBranch.score || 0,
      delta: { ...state.selectedBranch.delta },
      strategy: kilmannStrategy(state.selectedBranch).name,
    },
  ];
}

function averageDecisionScore(records) {
  if (!records.length) return 0;
  return records.reduce((sum, item) => sum + (item.score || 0), 0) / records.length;
}

function countBy(items, getter) {
  return items.reduce((acc, item) => {
    const key = getter(item);
    acc[key] = (acc[key] || 0) + 1;
    return acc;
  }, {});
}

function trajectoryInsight(profile) {
  const records = profile.records || [];
  const casesText = records.length === 1 ? "1 управленческому решению" : `${records.length} управленческим решениям`;
  const base = `План построен по ${casesText}, ошибкам в карте конфликта, выбранным стратегиям и финальным KPI.`;
  if (profile.avgScore >= 4.7 && profile.strategyCounts["Сотрудничество"]) {
    return `${base} Твоя сильная сторона — сотрудничество: ты чаще искал решение, которое одновременно держит результат и снижает напряжение в команде.`;
  }
  if ((profile.strategyCounts["Компромисс"] || 0) >= Math.max(2, Math.ceil(records.length / 2))) {
    return `${base} В траектории часто появлялся компромисс: ты умеешь стабилизировать ситуацию, но ИПР делает акцент на том, как доводить временные договорённости до устойчивого процесса.`;
  }
  if ((profile.strategyCounts["Избегание"] || 0) + (profile.strategyCounts["Соперничество"] || 0) >= Math.ceil(records.length / 2)) {
    return `${base} В траектории заметны рискованные стратегии: избегание или давление. Поэтому ИПР усиливает безопасную коммуникацию, раннее вмешательство и работу с корнем конфликта.`;
  }
  return `${base} Траектория смешанная: часть решений стабилизировала команду, а часть оставила напряжение под поверхностью. ИПР помогает закрепить сильные ходы и убрать повторяющиеся риски.`;
}

function decisionEvidenceHTML(records) {
  if (!records.length) return "<li>Решения пока не зафиксированы: пройди кейсы, чтобы получить персональный разбор.</li>";
  return records
    .slice(-5)
    .map((record) => {
      const caseItem = state.data.cases.find((item) => item.id === record.caseId);
      const title = caseItem?.title || `Кейс ${record.caseId}`;
      return `<li><b>${title}:</b> формат «${record.format}», стратегия «${record.strategy}», качество ${record.score}/5.</li>`;
    })
    .join("");
}

function profileBand(avgScore) {
  if (avgScore >= 4.7) return "ideal";
  if (avgScore >= 4) return "strong";
  if (avgScore >= 3) return "stable";
  if (avgScore >= 2) return "risk";
  return "critical";
}

  const main = strengths[0]?.title || "сильные управленческие решения";
  const second = strengths[1]?.title || "устойчивую коммуникацию";
  return [
    {
      title: "Амбасадорство управленческой практики",
      value: 100,
      reason: `Это не слабая зона. Твоя задача — масштабировать сильную компетенцию «${main}»: показывать команде, как ты разбираешь ситуацию до решения, а не только объявляешь итог.`,
      action: "Провести короткий peer-to-peer разбор для других лидов: взять один кейс, показать карту конфликта, выбранную стратегию и объяснить, почему решение снижает риск для команды.",
    },
    {
      title: "Передача опыта через шаблоны",
      value: 100,
      reason: `Компетенция «${second}» уже работает как сильная сторона. Следующий уровень — превратить её в повторяемый инструмент для команды.`,
      action: "Собрать 2 готовых шаблона: сообщение для общего чата и структура личного разговора. Дать коллегам использовать их в похожих ситуациях и собрать обратную связь.",
    },
  ];
}

function developmentProfile() {
  const records = decisionRecords();
  const avgScore = averageDecisionScore(records);
  const strategyCounts = countBy(records, (item) => item.strategy || "Не определено");
  const collaborationCount = strategyCounts["Сотрудничество"] || 0;
  const pressureCount = (strategyCounts["Соперничество"] || 0) + (strategyCounts["Избегание"] || 0);
  const dominantStrategy = Object.entries(strategyCounts).sort((a, b) => b[1] - a[1])[0]?.[0] || "смешанная стратегия";
  const casesPassed = records.length || 1;
  const competencies = [
    {
      title: "Диагностика конфликта",
      value: clamp(86 - state.mapErrors * 14),
      reason: state.mapErrors
        ? "На карте конфликта были ошибки, значит перед выбором действия стоит точнее отделять участников, причины, интересы и опасения."
        : "Карта конфликта разобрана уверенно: ты не свёл ситуацию к личной ссоре и увидел рабочую структуру проблемы.",
      action: "Перед каждым сложным разговором заполнять мини-карту: стороны, рабочая причина, интересы, опасения. Проверять себя вопросом: «что здесь является симптомом, а что корнем?»",
    },
    {
      title: "Выбор стратегии Томаса-Килмана",
      value: clamp(Math.round(avgScore * 18 + collaborationCount * 4 - pressureCount * 6)),
      reason:
        collaborationCount >= Math.ceil(casesPassed / 2)
          ? "Ты часто выбирал сотрудничество: искал решение, где учитываются и результат, и интересы людей."
          : `Чаще проявлялась стратегия «${dominantStrategy}»: она может стабилизировать ситуацию, но не всегда убирает источник напряжения.`,
      action: "Разобрать 3 своих решения через матрицу Томаса-Килмана: где было сотрудничество, где компромисс, где давление или избегание. Для каждого кейса переписать ответ в формате сотрудничества.",
    },
    {
      title: "Безопасная коммуникация",
      value: clamp(Math.round(state.metrics.trust - Math.max(0, state.metrics.hiddenConflict - 35) / 2 - pressureCount * 6 + 18)),
      reason:
        state.metrics.trust >= 60 && state.metrics.hiddenConflict <= 40
          ? "Команда получает сигнал, что конфликт можно обсуждать без наказания и обесценивания."
          : "Есть риск, что часть напряжения остаётся в личных переписках и молчании, даже если формально решение принято.",
      action: "Потренировать структуру безопасного сообщения: факт без оценки, признание интересов сторон, рабочее правило, следующий шаг и точка проверки результата.",
    },
    {
      title: "Операционное удержание",
      value: clamp(Math.round((state.metrics.sla + state.metrics.quality) / 2)),
      reason:
        state.metrics.sla >= 75 && state.metrics.quality >= 80
          ? "Ты удерживаешь фокус на SLA и качестве, не превращая конфликт только в разговор об эмоциях."
          : "Решения пока недостаточно защищают скорость и качество работы: процесс поддержки и эскалации требует закрепления.",
      action: "Собрать короткий рабочий стандарт: когда сотрудник задаёт вопрос, кто отвечает, за какое время, где фиксируется решение и как оно попадает в базу знаний.",
    },
    {
      title: "Устойчивость команды",
      value: clamp(Math.round(100 - (state.metrics.turnover + state.metrics.hiddenConflict) / 2)),
      reason:
        state.metrics.turnover <= 35 && state.metrics.hiddenConflict <= 40
          ? "Риск потери людей и скрытого сопротивления находится под контролем."
          : "Нагрузка, скрытый конфликт или ощущение несправедливости могут накапливаться и позже ударить по удержанию людей.",
      action: "Провести короткие индивидуальные чек-ины с ключевыми участниками: что перегружает, где нужна ясность, какой вклад не виден, какой один процесс нужно изменить первым.",
    },
  ].sort((a, b) => b.value - a.value);

  const strengths = competencies.slice(0, 2);
  const weakGrowth = competencies.filter((item) => item.value < 72).slice(-2).reverse();
  const band = profileBand(avgScore);
  const growth = band === "ideal"
    ? scalingRecommendations(strengths)
    : weakGrowth.length >= 2
      ? weakGrowth
      : [...weakGrowth, ...scalingRecommendations(strengths)].slice(0, 2);
  const plan = buildPlanByBand(band, growth, strengths);
  const bandText = {
    critical: "нужен восстановительный план: сначала безопасность и диагностика, затем выбор стратегии",
    risk: "есть управленческие риски: часть решений могла усиливать давление или откладывать проблему",
    stable: "база есть: следующий шаг — превращать удачные решения в устойчивые процессы",
    strong: "результат сильный: важно не чинить сильные стороны, а масштабировать их в практику команды",
    ideal: "результат близок к идеальному: ИПР строится вокруг амбасадорства, peer-to-peer и передачи опыта",
  };
  const summary = `Профиль сформирован по ${records.length || 0} решениям, ошибкам в карте конфликта и финальным KPI. Ведущая стратегия: ${dominantStrategy}. Среднее качество решений: ${avgScore ? avgScore.toFixed(1) : "0.0"}/5; ${bandText[band]}.`;
  return { summary, strengths, growth, plan, records, avgScore, strategyCounts, band };
}

function checkMap() {
  const questions = state.data.maps[String(state.currentCaseId)] || [];
  const visibleCount = currentMapVisibleCount();
  const currentStart = currentMapStartIndex();
  const currentQuestions = questions.slice(currentStart, visibleCount);
  const allAnswered = currentQuestions.every((_, offset) => state.mapAnswers[currentStart + offset]);
  if (!allAnswered) return;
  const hasError = currentQuestions.some((question, offset) => state.mapAnswers[currentStart + offset] !== question.correct);
  if (hasError) {
    state.mapErrors += 1;
    state.mapStageErrors[state.mapStage] = (state.mapStageErrors[state.mapStage] || 0) + 1;
    if (state.mapStageErrors[state.mapStage] >= 2) {
      render();
      return;
    }
    showMapStageTheory();
    return;
  }
  if (visibleCount < questions.length) {
    state.mapStage += 1;
    render();
    resetScrollPositions();
    return;
  }
  push("mapFeedback");
}

  return [

    ...(item.content || []).map((line) => `- ${line}`),
    "",
    "Примеры:",
    ...(item.examples || []).map((line) => `- ${line}`),
  ].join("\n");
}

function downloadTheory(index) {
  const item = state.data.theories[index];
  if (!item) return;
  const blob = new Blob([theoryText(index)], { type: "text/plain;charset=utf-8" });
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = `${item.title.toLowerCase().replace(/[^а-яa-z0-9]+/gi, "-").replace(/^-|-$/g, "")}.txt`;
  link.click();
  URL.revokeObjectURL(link.href);
}
