function handleUtilityAction(action) {
  if (action === "home") {
    goHomeScreen();
    return true;
  }
  if (action === "kpiPanel") {
    showKpiPanel();
    return true;
  }
  if (action === "theory") {
    showTheory();
    return true;
  }
  if (action === "dashboard" && ownerDashboardEnabled()) {
    showDashboardPanel();
    return true;
  }
  if (action === "mapTheory") {
    showMapStageTheory();
    return true;
  }
  if (action === "teamRoom") {
    push("teamRoom");
    return true;
  }
  if (action === "learningEvent") {
    showLearningEvent();
    return true;
  }
  return false;
}

function renderTheoryList(title, lines) {
  if (!lines || !lines.length) return "";
  return `
    <section>
      <h3>${title}</h3>
      <ul>${lines.map((line) => `<li>${line}</li>`).join("")}</ul>
    </section>
  `;
}

function visitedCaseIds() {
  return new Set(state.decisionHistory.map((item) => item.caseId));
}

function resolveNextCaseId(rawNext) {
  const next = Number.parseInt(rawNext, 10);
  if (!Number.isFinite(next) || next > 10) return null;
  const visited = visitedCaseIds();
  if (!visited.has(next)) return next;
  const forward = state.data.cases.find((item) => item.id > state.currentCaseId && !visited.has(item.id));
  if (forward) return forward.id;
  const anyUnvisited = state.data.cases.find((item) => !visited.has(item.id));
  return anyUnvisited?.id || null;
}

function nextCase() {
  const next = resolveNextCaseId(state.selectedBranch.nextCase);
  if (!next) {
    push("final");
    return;
  }
  state.currentCaseId = next;
  state.selectedFormat = "";
  state.selectedBranch = null;
  state.finalOutcome = "";
  state.mapAnswers = {};
  state.mapStage = 0;
  state.mapStageErrors = {};
  push("case");
}

function motivationPreparationScore() {
  const experience = motivationData();
  const hypothesis = experience.hypotheses.find((item) => item.id === state.motivation.hypothesisId);
  const dialogueScore = state.motivation.dialogueChoices.reduce((sum, item) => sum + item.score, 0);
  const solutionScore = experience.solutionParts.reduce((sum, part) => {
    const option = part.options.find((item) => item.id === state.motivation.solution[part.id]);
    return sum + (option?.score || 0);
  }, 0);
  const promise = experience.promises.find((item) => item.id === state.motivation.promiseId);
  return (hypothesis?.score || 0) + dialogueScore + solutionScore + (promise?.score || 0);
}

function applyMotivationFollowup(followupId) {
  const experience = motivationData();
  const outcome = experience.followUp.find((item) => item.id === followupId);
  if (!outcome) return;
  const preparation = motivationPreparationScore();
  const preparationBonus = preparation >= 11 ? 3 : preparation >= 7 ? 1 : -2;
  Object.entries(outcome.metricDelta).forEach(([key, delta]) => {
    const direction = motivationModule().metrics[key]?.risk ? -preparationBonus : preparationBonus;
    state.motivation.employeeMetrics[key] = clamp(state.motivation.employeeMetrics[key] + delta + direction);
  });
  Object.entries(outcome.teamDelta).forEach(([key, delta]) => {
    const direction = motivationData().teamMetrics[key]?.risk ? -preparationBonus : preparationBonus;
    state.motivation.teamMetrics[key] = clamp(state.motivation.teamMetrics[key] + delta + direction);
  });
  state.motivation.debt = outcome.debt;
  state.motivation.result = outcome;
  state.motivation.promises = state.motivation.promises.map((item) => ({
    ...item,
    status: followupId,
  }));
  state.motivation.stage = "result";
  render();
  resetScrollPositions();
}

function handleMotivationAction(button) {
  const experience = motivationData();
  if (button.dataset.hypothesis) {
    state.motivation.hypothesisId = button.dataset.hypothesis;
    render();
    return true;
  }
  if (button.dataset.dialogueChoice) {
    const node = experience.dialogue[state.motivation.dialogueStep];
    const choice = node?.choices.find((item) => item.id === button.dataset.dialogueChoice);
    if (!choice) return true;
    state.motivation.dialogueChoices.push(choice);
    if (!state.motivation.evidence.includes(choice.evidence)) state.motivation.evidence.push(choice.evidence);
    if (state.motivation.dialogueStep >= experience.dialogue.length - 1) {
      state.motivation.stage = "builder";
    } else {
      state.motivation.dialogueStep += 1;
    }
    render();
    resetScrollPositions();
    return true;
  }
  if (button.dataset.solutionPart && button.dataset.solutionOption) {
    state.motivation.solution[button.dataset.solutionPart] = button.dataset.solutionOption;
    render();
    return true;
  }
  if (button.dataset.promise) {
    state.motivation.promiseId = button.dataset.promise;
    render();
    return true;
  }
  if (button.dataset.followup) {
    applyMotivationFollowup(button.dataset.followup);
    return true;
  }
  if (!button.dataset.motivationAction) return false;
  const action = button.dataset.motivationAction;
  if (action === "restart") {
    resetMotivationState();
    state.screen = "motivation";
    render();
    resetScrollPositions();
    return true;
  }
  if (action === "followup") {
    const promise = experience.promises.find((item) => item.id === state.motivation.promiseId);
    state.motivation.promises = [{ ...promise, status: "pending" }];
  }
  state.motivation.stage = action;
  render();
  resetScrollPositions();
  return true;
}

function restart() {
  state.route = ["start"];
  state.screen = "start";
  state.currentCaseId = 1;
  state.selectedFormat = "";
  state.selectedBranch = null;
  state.finalOutcome = "";
  state.mapAnswers = {};
  state.mapStage = 0;
  state.mapStageErrors = {};
  state.mapErrors = 0;
  state.channelErrors = 0;
  state.formErrors = 0;
  state.decisionHistory = [];
  state.optionOrders = {};
  state.finalTracked = false;
  resetMotivationState();
  state.player.firstName = state.player.firstName || defaultPlayerNames[state.player.gender] || defaultPlayerNames.male;
  setMetricStarts();
  setTeamStarts();
  render();
}

function render() {
  if (!state.data) return;
  if (state.screen === "start") startView();
  if (state.screen === "orientation") orientationView();
  if (state.screen === "intro") introView();
  if (state.screen === "simulationSelect") simulationSelectView();
  if (state.screen === "simulationWelcome") simulationWelcomeView();
  if (state.screen === "inbox") inboxView();
  if (state.screen === "case") caseView();
  if (state.screen === "map") mapView();
  if (state.screen === "mapFeedback") mapFeedbackView();
  if (state.screen === "format") formatView();
  if (state.screen === "communication") communicationView();
  if (state.screen === "teamRoom") teamRoomView();
  if (state.screen === "result") resultView();
  if (state.screen === "final") finalView();
  if (state.screen === "motivation") motivationView();
}

view.addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button) return;
  if (handleMotivationAction(button)) return;
  if (button.dataset.metricInfo) {
    showMetricInfo(button.dataset.metricInfo);
    return;
  }
  if (handleUtilityAction(button.dataset.action)) return;
  if (button.dataset.action === "orientation") push("orientation");
  if (button.dataset.action === "intro") push("intro");
  if (button.dataset.action === "simulationSelect") {
    if (runtimeConfig.fixedSimulationId) {
      startCurrentSimulation();
    } else {
      push("simulationSelect");
    }
  }
  if (button.dataset.action === "inbox") push("inbox");
  if (button.dataset.action === "map") push("map");
  if (button.dataset.action === "checkMap") checkMap();
  if (button.dataset.action === "format") push("format");
  if (button.dataset.action === "nextCase") nextCase();
  if (button.dataset.action === "final") push("final");
  if (button.dataset.action === "restart") restart();
  if (button.dataset.action === "motivationStart") {
    resetMotivationState();
    push("motivation");
  }
  if (button.dataset.action === "randomAvatar") generatePlayerAvatar();
  if (button.dataset.case) {
    state.currentCaseId = Number(button.dataset.case);
    state.mapAnswers = {};
    state.mapStage = 0;
    state.mapStageErrors = {};
    push("case");
  }
  if (button.dataset.simulation) {
    state.currentSimulationId = button.dataset.simulation;
    state.currentCaseId = 1;
    state.selectedFormat = "";
    state.selectedBranch = null;
    state.finalOutcome = "";
    state.optionOrders = {};
    state.finalTracked = false;
    state.mapAnswers = {};
    state.mapStage = 0;
    state.mapStageErrors = {};
    if (button.dataset.simulation === "motivation") resetMotivationState();
    push("simulationWelcome");
  }
  if (button.dataset.format) {
    state.selectedFormat = button.dataset.format;
    push("communication");
  }
  if (button.hasAttribute("data-branch")) {
    const branch = findBranchBySourceIndex(button.dataset.branch);
    applyBranch(branch, Number(button.dataset.orderPosition || 0));
  }
  if (button.dataset.playerGender) {
    state.player.gender = button.dataset.playerGender;
    syncPlayerPortraitToGender();
    render();
  }
  if (button.dataset.playerHair) {
    state.player.hair = button.dataset.playerHair;
    render();
  }
  if (button.dataset.playerHairStyle) {
    state.player.hairStyle = button.dataset.playerHairStyle;
    render();
  }
  if (button.dataset.playerSkin) {
    state.player.skin = button.dataset.playerSkin;
    render();
  }
  if (button.dataset.playerAccessory) {
    state.player.accessory = button.dataset.playerAccessory;
    render();
  }
  if (button.dataset.playerOutfit) {
    state.player.outfit = button.dataset.playerOutfit;
    render();
  }
  if (button.dataset.member) {
    state.openMember = state.openMember === button.dataset.member ? "" : button.dataset.member;
    render();
  }
});

});

theoryDialog.addEventListener("click", (event) => {
  const button = event.target.closest("button");
  if (!button) return;
  if (button.dataset.metricInfo) {
    showMetricInfo(button.dataset.metricInfo);
    return;
  }
  if (button.dataset.theoryOpen) {
    showTheoryDetail(Number(button.dataset.theoryOpen));
    return;

    state.analytics.endpoint = endpoint;

    } catch (error) {}
    showDashboardPanel();
    return;
  }
  if (button.hasAttribute("data-theory-library")) {
    showTheory();
  }
});

function boot(data) {
    state.data = data;
    scormInitialize();
    const restoredFromScorm = restoreScormProgress();
    try {
      state.analytics.endpoint = analyticsEndpointFromRuntime() || localStorage.getItem("kredoLeaderDashboardEndpoint") || "";
      loadAnalyticsState();
    } catch (error) {
      state.analytics.events = [];
      state.analytics.pending = [];
    }
    if (runtimeConfig.fixedSimulationId) {
      state.currentSimulationId = runtimeConfig.fixedSimulationId;
      const fixedCard = state.data.simulations?.find((item) => item.id === runtimeConfig.fixedSimulationId);
      if (fixedCard) fixedCard.status = "available";
    }
    const motivationCard = state.data.simulations?.find((item) => item.id === "motivation");
    if (motivationCard && window.MOTIVATION_EXPERIENCE) {
      motivationCard.status = "available";
      motivationCard.entryCaseId = 1;
      motivationCard.description =
        "Разбери изменение в поведении сотрудника, проверь причину в разговоре, собери решение и выполни обещание.";
    }
    if (!restoredFromScorm) {
      setMetricStarts();
      setTeamStarts();
      resetMotivationState();
    }
    if (restoredFromScorm) trackEvent("session_resumed", { location: scormGet("cmi.location") });
    void flushAnalyticsQueue();
    render();
}

window.addEventListener("pagehide", terminateScorm);
window.addEventListener("beforeunload", terminateScorm);

if (window.GAME_DATA) {

} else {

          </section>

    });
}



/* Simulation Bridge v0.8 */
window.CurrentSimulation = null;

window.loadSimulationModule = async function loadSimulationModule(simulationId) {
  if (!window.SimulationLoader) {
    throw new Error("SimulationLoader is not available. Check data/simulation-loader.js connection.");
  }

  const loadedSimulation = simulationId
    ? await window.SimulationLoader.loadSimulationById(simulationId)
    : await window.SimulationLoader.loadDefaultSimulation();

  window.CurrentSimulation = loadedSimulation;

  console.log("[Simulation Bridge] Loaded simulation:", loadedSimulation.id, loadedSimulation.title);

  return loadedSimulation;
};

window.getCurrentSimulation = function getCurrentSimulation() {

/* Analytics Bridge v0.9 */
window.trackSimulationEvent = function trackSimulationEvent(eventName, payload = {}) {
  if (!window.SimulationAnalytics) {
    // SCORM uses the built-in trackEvent queue; an optional external bridge is not required.
    return null;
  }

  return window.SimulationAnalytics.track(eventName, payload);
};

window.startSimulationAnalyticsSession = function startSimulationAnalyticsSession(simulationId) {

window.exportSimulationAnalyticsCsv = function exportSimulationAnalyticsCsv() {

/* Analytics Auto Hooks v1 */
(function installAnalyticsAutoHooks() {
  if (window.__analyticsAutoHooksInstalled) {
    return;
  }

  window.__analyticsAutoHooksInstalled = true;

  function getSimulationId() {
    return window.CurrentSimulation?.id || "default-conflict-simulation";
  }

  function safeTrack(eventName, payload = {}) {
    if (!window.trackSimulationEvent) {
      return null;
    }

    try {
      return window.trackSimulationEvent(eventName, {
        simulation_id: getSimulationId(),
        ...payload
      });
    } catch (error) {
      console.warn("[Analytics Auto Hooks] Failed to track:", eventName, error);
      return null;
    }
  }

  function copyMetrics() {
    if (!state || !state.metrics) {
      return {};
    }

    return JSON.parse(JSON.stringify(state.metrics));
  }

  function emitMetricChanges(before, after, branch) {
    const metricIds = new Set([
      ...Object.keys(before || {}),
      ...Object.keys(after || {})
    ]);

    metricIds.forEach((metricId) => {
      const valueBefore = before?.[metricId];
      const valueAfter = after?.[metricId];

      if (valueBefore === valueAfter) {
        return;
      }

      safeTrack("metric_changed", {
        case_id: state.currentCaseId || branch?.caseId || null,
        branch_id: branch?.id || null,
        metric_id: metricId,
        value_before: valueBefore,
        delta: typeof valueBefore === "number" && typeof valueAfter === "number"
          ? valueAfter - valueBefore
          : null,
        value_after: valueAfter
      });
    });
  }

  if (typeof applyBranch === "function" && !window.__applyBranchAnalyticsWrapped) {
    const originalApplyBranch = applyBranch;

    applyBranch = function patchedApplyBranch(branch, orderPosition = null) {
      const beforeMetrics = copyMetrics();

      const result = originalApplyBranch(branch, orderPosition);

      const afterMetrics = copyMetrics();

      emitMetricChanges(beforeMetrics, afterMetrics, branch);

      safeTrack("case_completed", {
        case_id: branch?.caseId || state.currentCaseId || null,
        branch_id: branch?.id || null,
        order_position: orderPosition,
        format: state.selectedFormat || null,
        strategy: branch?.strategy || null,
        score: branch?.score || null
      });

      return result;
    };

    window.__applyBranchAnalyticsWrapped = true;
    console.log("[Analytics Auto Hooks] applyBranch wrapped");
  }

  if (typeof currentCase === "function" && !window.__caseOpenedAnalyticsStarted) {
    let lastCaseId = null;

    setInterval(() => {
      try {
        const item = currentCase();

        if (!item || !item.id) {
          return;
        }

        if (item.id !== lastCaseId) {
          lastCaseId = item.id;

          safeTrack("case_opened", {
            case_id: item.id,
            case_title: item.title || null
          });
        }
      } catch (error) {
        // Silent: currentCase may not be ready during early render.
      }
    }, 1500);

    window.__caseOpenedAnalyticsStarted = true;
    console.log("[Analytics Auto Hooks] case_opened watcher started");
  }
})();
